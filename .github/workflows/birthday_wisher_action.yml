name: Birthday Wisher Daily Python Script

on:
  schedule:
    # 8:00 AM IST is 2:30 AM UTC
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/birthday-wisher

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # This is your "Forever Latest" setting
          python-version: '3' 
          # Check for a newer version on every run
          check-latest: true 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script 
        env:
            EMAIL_ID: ${{secrets.EMAIL_ID}}
            EMAIL_ID_PASSWORD: ${{secrets.EMAIL_ID_PASSWORD}}
            EMAIL_PROVIDER_SMTP_ADDRESS: ${{ secrets.EMAIL_PROVIDER_SMTP_ADDRESS }}
        run: python main.py

      - name: List files for debugging
        run: ls -R