name: Daily Python Script

on:
  schedule:
    # 7:00 AM IST is 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # If you don't have a requirements file, use:
          # pip install requests (or whatever you need)

      - name: Run Python script
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          OWM_Endpoin: ${{ secrets.OWM_Endpoint}}
          account_sid : ${{ secrets.account_sid }}
          auth_toke: ${{ secrets.auth_token }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER}}
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER}}"
          MY_EMAIL: ${{ secrets.MY_EMAIL}}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD}} 
        run: python your_script_name.py
