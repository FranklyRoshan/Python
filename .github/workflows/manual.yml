name: Rain Alert SMS Daily Python Script

on:
  schedule:
    # 7:00 AM IST is 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests flask twilio

      - name: Run Python script
        working-directory: FranklyRoshan/Python/python-projects/rain-alert-SMS/
        env:
            WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
            TWIILIO_ACCOUTN_SID: ${{ secrets.TWIILIO_ACCOUTN_SID }}
            TWIILIO_AUTH_TOKEN: ${{ secrets.TWIILIO_AUTH_TOKEN }}
            TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
            MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }}
            MY_EMAIL: ${{secrets.MY_EMAIL}}
            MY_EMAIL_PASSWORD: ${{secrets.MY_EMAIL_PASSWORD}}
        run: python main.py
