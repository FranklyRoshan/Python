name: Stock News Daily Python Script

on:
  schedule:
    # 7:00 AM IST is 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/stock-news

    steps:
      - name: Checkout code
        uses: actions/checkout@main 

      - name: Set up Python
        uses: actions/setup-python@main
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script 
        env:
            STOCK_API_KEY: ${{secrets.STOCK_API_KEY}}
            NEWS_API_KEY: ${{secrets.NEWS_API_KEY}}
            TWILIO_SID: ${{ secrets.TWILIO_SID }}
            TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
            VIRTUAL_TWILIO_NUMBER: ${{ secrets.VIRTUAL_TWILIO_NUMBER }}
            VERIFIED_NUMBER: ${{ secrets.VERIFIED_NUMBER }}
            EMAIL_ID: ${{secrets.EMAIL_ID}}
            EMAIL_ID_PASSWORD: ${{secrets.EMAIL_ID_PASSWORD}}
            EMAIL_PROVIDER_SMTP_ADDRESS: ${{ secrets.EMAIL_PROVIDER_SMTP_ADDRESS }}

        run: python main.py
      
      - name: List files for debugging
        run: ls -R
